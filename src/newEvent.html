<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDLC - Gestion Assos</title>
    <link rel="icon" href="BDLC.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
        <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="BDLC.png" alt="BDLC Logo" height="40" class="me-2">
                Site BDLC
            </a>
        </div>
    </nav>
    <header class="py-5 text-center container">
        <div class="row py-lg-5">
            <div class="col-lg-6 col-md-8 mx-auto">
                <h1 class="fw-light">Ajouter un événement</h1>
            </div>

        </div>
        <a href="index.html" class="btn btn-primary">Retour</a>

        </header>

        <div class="row py-lg-5">
            <div class="col-lg-6 col-md-8 mx-auto">
                <form id="event-form">
                    <div class="mb-3">
                        <label for="title" class="form-label">Titre de l'événement</label>
                        <input type="text" class="form-control" id="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="asso" class="form-label">Association</label>
                        <input type="text" class="form-control" id="asso" required>
                    </div>
                    <div class="mb-3">
                        <label for="lieu" class="form-label">Lieu</label>
                        <input type="text" class="form-control" id="lieu" required>
                    </div>
                    <div class="mb-3">
                        <label for="prix" class="form-label">Prix</label>
                        <input type="text" class="form-control" id="prix" required>
                    </div>
                    <div class="mb-3">
                        <label for="date" class="form-label">Date</label>
                        <input type="date" class="form-control" id="date" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary w-auto">Ajouter l'événement</button>
                        <a href="index.html" class="btn btn-secondary w-auto">Retour</a>
                    </div>
                </form>
            </div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('event-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const eventData = {
                title: document.getElementById('title').value,
                asso: document.getElementById('asso').value,
                lieu: document.getElementById('lieu').value,
                prix: document.getElementById('prix').value,
                date: document.getElementById('date').value
            };

            try {
                const response = await fetch('http://localhost:3000/api/events', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(eventData)
                });

                if (response.ok) {
                    alert('Événement ajouté avec succès !');
                    window.location.href = 'index.html';
                } else {
                    alert('Erreur lors de l\'ajout de l\'événement');
                }
            } catch (err) {
                console.error("Erreur API:", err);
                alert('Erreur : Impossible de contacter le backend (Vérifie Docker !)');
            }
        });
    </script>
</body>
</html>
