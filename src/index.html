<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDLC - Gestion Assos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">   
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">Site BDLC</a>
        </div>
    </nav>

    <header class="py-5 text-center container">
        <div class="row py-lg-5">
            <div class="col-lg-6 col-md-8 mx-auto">
                <h1 class="fw-light">Pages Assos</h1>
                <p class="lead text-muted">Événements récupérés en direct de la base de données.</p>
            </div>
        </div>
    </header>

    <div class="container pb-5">
        <div class="row row-cols-1 row-cols-md-3 g-4" id="events-container">
            <div class="text-center w-100">
                <p>Chargement des événements...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        async function loadEvents() {
            try {
                const response = await fetch('http://localhost:3000/api/events');
                const events = await response.json();
                
                const container = document.getElementById('events-container');
                
                if (events.length === 0) {
                    container.innerHTML = '<p class="text-center w-100">Aucun événement trouvé.</p>';
                    return;
                }

                container.innerHTML = events.map(event => `
                    <div class="col">
                        <div class="card h-100 shadow-sm border-primary">
                            <div class="card-body">
                                <h5 class="card-title text-primary">${event.title}</h5>
                                <p class="card-text"><strong>Asso :</strong> ${event.asso}</p>
                                <p class="card-text"><strong>Lieu :</strong> ${event.lieu}</p>
                                <span class="badge bg-info text-dark">${event.prix}</span>
                            </div>
                            <div class="card-footer bg-transparent border-top-0">
                                <small class="text-muted">📅 Date : ${event.date}</small>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Erreur API:", err);
                document.getElementById('events-container').innerHTML = 
                    `<p class="text-danger text-center w-100">Erreur : Impossible de contacter le backend (Vérifie Docker !)</p>`;
            }
        }

        // Lancement au chargement de la page
        loadEvents();
    </script>
</body>
</html>
